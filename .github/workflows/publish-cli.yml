name: Publish CLI

on:
  push:
    tags: ['cli-v*']

permissions:
  contents: read
  id-token: write   # required for OIDC trusted publisher

jobs:
  publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.5
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install (workspace root)
        working-directory: .
        run: bun install --frozen-lockfile

      - name: Build CLI
        run: bun run build

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG="${GITHUB_REF_NAME#cli-v}"
          if [ "$PKG_VERSION" != "$TAG" ]; then
            echo "::error::tag $TAG does not match package.json version $PKG_VERSION"
            exit 1
          fi

      - name: Pack tarball (bun rewrites workspace:* deps)
        run: bun pm pack

      - name: Publish tarball to npm (OIDC trusted publisher / provenance)
        run: |
          TARBALL=$(ls -1 *.tgz | head -n1)
          if [ -z "$TARBALL" ]; then
            echo "::error::no tarball produced by 'bun pm pack'"
            exit 1
          fi
          echo "publishing $TARBALL"
          npm publish "$TARBALL" --provenance --access public
